<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-magic"></i> Portfolio Generator</h1>
            <p>Create your professional portfolio in minutes</p>
        </header>

        <div class="generator-section">
            <h2>1. Enter Your Information</h2>
            <form id="portfolioForm">
                <!-- Basic Info -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Name" required>
                </div>

                <div class="form-group">
                    <label>Title/Profession</label>
                    <input type="text" id="title" placeholder="Full Stack Developer" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="+91 9000000000">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="MUMBAI">
                </div>

                <div class="form-group">
                    <label>About Me</label>
                    <textarea id="about" placeholder="Write a brief description about yourself..." rows="4"></textarea>
                </div>

                <!-- Social Links -->
                <h3>Social Links</h3>
                <div class="form-group">
                    <label><i class="fab fa-github"></i> GitHub</label>
                    <input type="url" id="github" placeholder="https://github.com/username">
                </div>

                <div class="form-group">
                    <label><i class="fab fa-linkedin"></i> LinkedIn</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/username">
                </div>

                <div class="form-group">
                    <label><i class="fab fa-twitter"></i> Twitter</label>
                    <input type="url" id="twitter" placeholder="https://twitter.com/username">
                </div>

                <!-- Skills -->
                <h3>Skills</h3>
                <div id="skillsContainer">
                    <div class="skill-input">
                        <input type="text" placeholder="JavaScript" class="skill">
                        <button type="button" onclick="removeSkill(this)"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <button type="button" onclick="addSkill()" class="add-btn"><i class="fas fa-plus"></i> Add Skill</button>

                <!-- Projects -->
                <h3>Projects</h3>
                <div id="projectsContainer">
                    <div class="project-input">
                        <input type="text" placeholder="Project Name" class="project-name">
                        <input type="text" placeholder="Project Description" class="project-desc">
                        <input type="url" placeholder="Project URL" class="project-url">
                        <button type="button" onclick="removeProject(this)"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <button type="button" onclick="addProject()" class="add-btn"><i class="fas fa-plus"></i> Add Project</button>

                <button type="submit" class="generate-btn"><i class="fas fa-rocket"></i> Generate Portfolio</button>
            </form>
        </div>

        <div class="preview-section" id="previewSection" style="display: none;">
            <h2>2. Preview Your Portfolio</h2>
            <div id="portfolioPreview"></div>
            <div class="actions">
                <button onclick="downloadPortfolio()" class="download-btn"><i class="fas fa-download"></i> Download Portfolio</button>
                <button onclick="editPortfolio()" class="edit-btn"><i class="fas fa-edit"></i> Edit Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
